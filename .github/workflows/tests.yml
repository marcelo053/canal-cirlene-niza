name: Tests

on:
  push:
    branches: [master, "feat/**", "fix/**", "chore/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short
        env:
          TELEGRAM_BOT_TOKEN: "dummy-token"
          FAL_API_KEY: "dummy-fal-key"
          MINIO_ACCESS_KEY: "dummy-access"
          MINIO_SECRET_KEY: "dummy-secret"
          BASEROW_TOKEN: "dummy-token"
          BASEROW_DATABASE_ID: "0"
          ELEVENLABS_API_KEY: "dummy-el-key"
          HEYGEN_API_KEY: "dummy-hg-key"
          MINIMAX_API_KEY: "dummy-mm-key"
